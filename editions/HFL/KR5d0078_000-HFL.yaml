body:
  text: 純陽眞人渾成集序尊七竊謂古人無心於爲文故言發乎誠而大體全後世有心於爲名故文過乎情而華藻勝大體者根於自然華藻者出於使然自然者同乎天使然者參乎人心聲之發見限量不言而判爾且焕而爲日月章而爲雲漢融而爲山川散而爲草木仰觀俯察萬象森羅莫非天之文地之理而天地大化豈容心於此哉無言而生不爲而化蓋有不期然而然也我祖純陽吕翁眞人學貫天人之際手握造化之機矢口成言灑翰成章初非心思智慮之所致抑亦天機自發沛然莫能禦者其勸世也隨方設化辭白義精觀之使人判然冰釋怡然理順廉貪敦薄勃勃然稔絶塵之慮歟其誅劔也假物明理氣豪心放讀之使人釋然四解神清氣逸刮垢磨光飄飄然有昇虛之思歟夫仙翁之出神入聖千變萬化其文散落於人間殆不可以兼收而備舉甫於藏室中得其詩章二百有餘釐爲二卷名之曰渾成集以其渾然天成非人爲所能及也執事於純陽宫者議欲鋟木以廣其傳庶與四方共之因囑予序引剛拒不能姑爲道其梗槩其中亥豕之疑不無一二安敢以巳意輒更之疑以傳疑當俟達者嗚呼有能即其詩以求其心因其心以得其行由其所行之行以造聖人之道其亦庶幾乎愚不能無望於俊之學者峕辛亥歲閏十月望日條陽清眞道人何志淵頓首稽首謹序
