front:
  text: 純陽眞人渾成集卷下尊八
  hash: sha256:80a6435679cbac83e757e4600c69497420f213a02c31a622732c084214ffd33a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0078_SJB_002-230690c, image: sjb/23/230690c.png}
body:
  text: 七言律詩功滿來來濟會難又聞東去杏仙壇杖頭春色一壺酒頂上雲攢五嶽冠飲海龜兒人不識燒山符子鬼難看先生去後身須老乞與貧儒换骨丹金丹一粒定長生須得眞鉛鍊甲庚火取南方赤鳳髓水求北海黑龜精鼎隨四季中央合藥逐三元八卦行齋戒興功成九轉定知入口鬼神驚碧潭深處一眞人貌似桃花體似銀鬢髪不斑縁有術紅顔不老爲通神蓬萊要去如今去架上黄衣化作雲任使桑田變成海一丸丹藥定千春罏養丹砂鬢不斑豈干名利住人間巳逢至士傳神藥又喜同流動笑顔老子道親分付得少微星許共相攀幸蒙上士甘撈摝處世輸君一箇閑誰爲長生俟我哉鍊成眞氣在仙胎盡知白日昇天去剛逐紅塵下世來白虎行時傾雨露赤龍耕處是瓊瑰只吞一粒丹砂藥飛入青雲更不迴亂雲堆裏表星都認得深藏一丈夫緑酒醉眠閑日月白蘋風定釣江湖長將氣度合天道不把言詞問世塗山水路遥人不到茅若消息近知無鶴爲車騎酒爲糧爲變長生不死鄉地脉尚猶縮得短人生豈不使教長簮中徃徃星辰現帔下時時日月藏時流若要親相見朝朝不離水銀行靈芝無種亦無根解飲能餐自返魂但得煙霞供歲月任他烏兔走乾坤嬰兒只戀陽中母姹女須朝頂上尊一得不迴千古内更無塜墓示兒孫世上何人會此言休將名利掛心田等閑倒盡十分酒遇興高吟一百篇物外煙霞爲伴侣壺中日月從嬋娟他時功滿歸何處直駕雲車入洞天玄門帝子坐中央得壽明長感玉皇天下山河和雨露袖中日月混瀟湘坎男迴娉金家女離女交勝嫁木郞眞箇夫妻能守志立教牽惹在陰陽凡骨退來知幾載碧峯高卧餌玄霜青山古雪圍松榻仙掌寒雲鍊石房貝闕每攀瓊蘂嫩蟾宫時折桂花香爛然翠錦曾相啓許我同遊五帝鄉遥指高峯嘯一聲紅霞紫霧面前生每於廛市無人識長到山中有鶴迎杖弄玉蟾驅鬼魅夜煎金鼎煑星辰他時若赴蓬萊洞知我仙家有姓名堪笑時人問我家杖檐雲袖惹煙霞眉藏火電非他說手種金蓮不自誇三尺焦桐爲活業一壺春酒是生涯騎龍逺出遊三島夜後無人翫月華九曲江邊坐卧看一條長路入天端慶雲捧擁朝赤子瑞氣徘徊處白煙鉛汞此時爲至藥坎離今日結成丹功能濟命無衰老只在人心不是難修修修得到乾乾方號人間一醉仙世上光陰催短景洞中花木任長年形飛峭壁知龍骨神在玄宫别有天唯願先生頻一顧更休玄外問玄玄玄門玄理又玄玄不死根元在汞鉛知是一般眞箇術調和六一也同天玉京山下羊兒鬧金水河中石虎眠要妙能生眞本體精勤到處自如然公卿雖貴不曾酬說著仙家便去遊爲挹石肝逢蜃海因尋甜雪到瀛洲山川醉后壺中放神鬼閑來匣裏收據見目前無箇識不如杯酒混凡流曾朝元始訪仙家恣上崑崙嚥月華玉女搏攏蒼獬豸山童提揳白蝦䗫時斟海内千年酒慣摘壺中四序花今在人寰人不識看看揮袖入煙霞火種丹田金自生重重樓閣甚分明三千功行百旬日萬里蓬萊一日程形化陰司無鬼簿玉都長是有仙名今晨得赴瑶池會九節幢旛洞裏迎因看崔公入藥鏡令人心地轉分明陽龍言向離宫出陰虎還於坎上生二物會時爲道本五方行盡得丹名修眞上士如知此定跨赤龍歸玉京浮生不實爲輕忽衲服身藏奇異骨是非了達世間人焉能物外通無物共語凡兮情兀兀獨自行兮輕拂拂一點刀圭五彩分飛丹走入神仙窟莫怪愛吟天上詩蓋縁吟得世間稀慣餐王母洞中飯曾著蓬萊洞裏衣馬踏日輪紅霧捲鳳銜月角碧雲飛何時再控青絲轡又掉金鞭入紫微黄芽白雪兩飛金行即高歌醉即吟日月暗扶君甲子乾坤自與我知音精靈滅跡三清劔風雨騰空一弄琴的當南遊歸甚處莫教鶴去上天尋春來遊蕩到仙家户列殊常二月花甲子盡推君行業庚申得遂不須誇各有清靈天外性肯忘渾濁棄驕奢千日功夫如會得萬年歸去入煙霞雲𩯔雙明骨更輕自言尋鶴到蓬瀛日論草樂皆知味問著神仙盡得名冷夜青龍穿碧洞枕寒高卧白銀城來春又擬携笻去爲憶軒轅海上行龍精龜眼兩相和丈六童男不奈何九盞水中煎赤子一輪火内養黄芽月圓自解離天網功滿方知出地羅半醉好吞鸞鳳髓勸君休更認彌阤强居此景絶知音野景雖多不合吟詩句若喧卿相耳姓名還動帝王心道無腰帶獨慵卧花竹皮冠尚懶簪除此更無餘箇事一壺村酒一張琴華陽山裏多芝田華陽山叟復延年青松嵒畔高柯下白雲堆裏飮飛泉不寒不熱神蕩蕩東來西去氣綿綿三千功滿好歸去休與時人說洞天天生不散自然心成敗從來古與今得路應知皆出世迷徒終是枉埋沈身邊至樂須攻鍊物外丹砂且細尋咫尺洞房仙景在莫隨波浪没光陰自隱玄都不記春幾因滄海變成塵玉京殿裏朝元始金闕宫中拜老君悶即駕乘千歲鶴閑來高卧九天雲我今學得長生法未肯傳留與世人北帝南辰掌内看潜通造化暗相傳金鎚袖裏居元宅玉户星宫降上玄舉世盡皆尋此道誰人空裏得玄關明明道在堪消息日月灘頭去又還日影光中合自然奔雷走電入中原長騎赤馬居東殿大啓朱門浮碧泉怒拔昆吾歌聖化喜陪孤月賀新年方知却是神仙物得在仁人始授傳六龍齊賀得昇乾頭角潜通造化權眞道每吟秋月淡至言長運碧波寒晝乘白鹿遊蓬島夜頂金冠立古壇一載已成千歲藥誰人將袖染塵寰五嶽灘頭景象新仁人方達杳冥身天歌運道三元靜地脉通來萬物生且曉谷神修此道罷論理性欲尋眞明明說向中黄路霹靂聲中自得神欲陪仙侣得身輕飛過蓬萊徹上清朱頂鶴來雲外接紫鱗魚向海中迎姮娥嫩桂花先吐王母仙桃子漸成下瞰日輪天欲曉定知人世久長生四海皆忙一箇閑人人口内說塵縁知君有道來山上何似無名住世間十二樓臺藏祕訣五千言内隱玄關方知鼎貯星辰藥乞取刀圭一粒看割斷繁華掉却榮便從初得是長生曾於錦水留蟬蛻又到蓬萊别姓名三徃徃來無否泰一塵塵在世人情不知功滿歸何處直跨蒼龍上玉京當年詩價滿皇都掉臂西歸是丈夫萬頃白雲獨自有一枝仙桂阿誰無等閑渭曲漁翁引醉上蓮峯道士扶他日與君重際會竹溪茅舍夜相呼金鎚灼灼舞天階獨自騎龍去又來高卧白雲觀日窟閑眠秋月擘天開離花片片乾坤産坎蘂翩翩造化裁晩醉九巖回首望北邙山下骨皚皚結交常與道情深日月隨他出又沈苦要目通雲外鶴直須志鍊水中金丹成只恐乾坤窄餌了寧憂疾患侵未去瑶臺猶混世不妨杯酒喜閑吟偶携琴劔下煙蘿何幸今朝喜暫過比相本來皆似可針醫偏更效無多仙經嘗讀三千卷古法曾持十二科些小仙方如不信金階撒手試看麽傾倒華陽醉再三騎龍遇晩下南嵒眉因拍劔流星電衣爲眠雲惹碧嵐金液變來成雨露玉都歸去老松杉曾將鐵鏡照神鬼霹靂搜尋水滿潭鐵鏡烹金火滿空碧潭龍卧夕陽中麒麟意合乾坤地獬豸機關日月東三尺劎横雙水岸五丁冠頂百神宫閑鋪羽翠拘神窟自著金蓮造化功隨縁信業任浮沈似水如雲一片心兩卷道經三尺劎一條藜杖七弦琴壼中有藥逢人施腹内新詩遇客吟一嚼汞添千載壽一丸丹點一斤金半醉嵒前度幾秋騎龍駕鳳永無憂王侯宰相全不愛坎離兩件是奇籌獨坐蓬萊觀宇宙抽劔眉間海上遊爲見不平心裏事解冤雪恥取人頭琴劔酒棊龍鶴虎逍遥落𩲸永無憂閑騎白鹿遊三島時駕青牛過十洲碧洞逺觀明月掌青山高隱伴雲頭時人若要還如此名利浮華即便休紫極宫中我自知精磨神劔劔還飛先差玉子開南殿後遣青龍入北微九鼎黄芽棲睡鳳一軀仙骨養靈芝蓬萊不是人安處只怕愚人泄世機回身方始出埃塵造化功夫只在人早使亢龍抛地網豈知白虎出天眞綿綿有路誰留我默默忘言自合神擊劔夜深歸甚處披星帶月斬麒麟看盡閑閑過落花一迴舞劎一吁嗟常憂白日光陰促每恨青天道路賒本志不求名與利元心只慕水兼霞世間萬種浮沈事誰人達理似余家日爲陳解月吁丹華夏諸侯肉眼看仁義異如胡越異世情難似泰衡難八仙鍊就終成刃四海磨來照瞻寒平却不平千萬萬拍劔騎龍上九天别來漲水浸東風醉眼吟情慵不慵轟振乾坤金劔吼烹煎日月玉鑪封杖遥楚甸三千里鶴翥秦川一萬重爲報𣈆城仙子道再期春色會蓮峯髡頭血滴眼如鐶吐氣雲生怒世間叵耐不平千種事須期一訣蕩兇頑蛟龍斬處翻滄海暴虎除時拔逺山爲滅無情兼負義劔光星染點痕斑雨雪霏霏天已暮金鍾滿勸撫焦桐詩吟席上未移刻劎舞筵前疾似風何事行桮常午夜忽然怒目便騰空不知誰是虧忠孝携箇人頭入坐中風霜三尺鬼神愁大袖高冠得自由喜極誇前歌越曲怒來眉際拔吴鈎自從碧海離三島不上朱門謁五侯半醉諤然攘臂立問誰懷抱有冤讎未鍊還丹且鍊心丹成方覺道源深每留客有錢沽酒誰信君無藥點金洞裏風雷歸掌握壺中日月在胷襟神仙事業人難會養性長生自意吟鐵牛耕地種金錢刻石童兒把貫穿一粒粟中藏世界半升鐺内煑山川白鬚老子眉垂地碧眼胡兒手指天若向此中玄會得此玄玄后更無玄箕星昴宿下長天凡景寧教不諤然龍出水來鱗甲就鶴冲天去羽毛全塵中教化千人眼世上難知爾雅篇自是凡流福命薄忍將微妙略輕傳閑來擺臂入天門拂袂徐徐撮綵雲無語下窺黄谷子破顔平揖紫霞君擬登瑶殿偎金久迴訪瀛洲看日輪恰值姮娥纔宴會瓊漿新熟味氤氲鲁隨劉阮醉桃源未醒人間欠酒錢一領布裘權且當九天迴日却歸還鳳毛襖子非爲貴狐白裘裳欲比難只此世間無價寶不然火裏試燒看因思徃事却成憨鲁讀千文第十三武氏死時應室女陳王殁後是童男兩輪日月從他載九箇江豬一檐擔盡日無人話消息一壺春酒且醺酣垂袖騰騰徹世塵胡蘆携却數遊巡利名身外終非道龍虎門前辨取眞不覺夢魂朝紫府數年蹤跡隱埃塵華陰市内如相見不是尋常賣藥人萬卷仙經三尺琴劉安聞說是知音杖頭春色一壺酒鑪内丹砂不點金幾度醉眠山路口閑來遊釣洞庭心相逢相遇知多少只恐冲天没處尋魯戰蚩尤玉府前六龍高駕振鳴鑾指南車後隨金鼓皂纛旗傍帶鐵冠醉捋黑髭三島黯怒抽霜劔十洲寒軒轅世代横行後直隱深嚴久覓難頭髪蒼浪聲似鍾貌如冰雪骨如松匣中寶劔時時吼袖裏金鎚逞武風會飮酒時爲伴侣能吟詩句便叅同年來定赴崑侖宴騎箇生獰九色龍神仙户入黃宫闕將相門開白玉京可使洞中無好景其餘天下有衆生携琴獨步閑隨鶴匣劎輝霞待斬鯨進退兩楹俱未决憑君與我指前程世情陰雨疑相孤電閃雷聲振八都長去亂山添霧露不來平地救燋枯原融春色留聲振結構秋風害旅途弄却三間破草舍臨時看得幾年無七言絶句秋景蕭條葉亂飛庭松影裏坐移時雲迷鶴駕何方去仙洞朝元失我期捉得金精作命基日魂東畔月華西於中鍊取長生藥服了還同天地齊朝泛浮名暮却還洞中日月我爲天匣中寶劔時時吼不遇志人誓不傳劔起星奔萬里誅風雷隨處雨聲麤人頭携到語猶在騰步高吟過五湖先生先生貌獰惡拔劎當胷气雲錯連喝三回急急聲欻然空裏人飛落先生先生莫悠悠道要人傳劔要讎今日相逢於海畔旋追村酒去同遊厖眉陡堅惡精神萬里騰空一踴身背上匣中三尺劔爲天用斬不平人磨利青風三尺劔袖裏金鎚不亂揮但是讎人須一報豈教人道不男兒麤眉卓堅語如雷聞說冤讎便住杯仗劔當空千里去一更别我二更迴今朝早起抹漆黑千里報讎同頃刻袖中傾下死人頭口内猶言道得得南山東畔忽相逢握手丁寧語似鍾劎術巳成君别後有蛟龍處斬蛟龍天下都遊半日功不銷跨鳳與乘龍偶因博戲飛神劔摧却終南第一峯朝遊南越暮蒼梧袖裏青蛇膽氣麤三入岳陽人不識朗吟飛過洞庭湖學道須教徹骨貧囊中只是五三文有人問我修行法遥指天邊日月輪不負三光不負人不欺神道不欺貧有人問我修行法只種心田養此身三畒丹田無種種種時須得赤龍耕鲁將此子教人種不解修持道不生不用祶媒向外求還丹只在體中收莫言大道人難得自是功夫不到頭飲酒須教一百杯東浮西泛自梯媒日精若與月華合有箇明珠走上來閃灼虎龍神物飛好憑身事莫相違傳時須在乾坤力便徹三清透紫微混元海底隱生輪内有黄童玉帝君白雪神符潜姹女靈元鎮在十元君莫怪瑶池消息稀只縁塵事隔天機若人尋得水中火有箇玉童上太微偎嵒拍手葫蘆舞過嶺穿雲拄杖飛來徃八千消半日金州南畔有松扉趯倒葫蘆掉却琴到行直上卧牛岑水飛石上迸如雪立地看天坐地吟瓶子如金玉子黄上昇下降續神糧三元一會經年靜這箇天中日月長肘傳丹篆千年術口誦黃庭兩卷經鶴觀古壇槐影裏悄無人跡户長扃吾家本住在天齊零落白雲鎖石梯蓬島海東逾萬里依舊歸來路不迷蓮峯道士高且潔不下蓮峯經歲月星辰夜禮玉簮寒龍虎曉開金鼎熱我自忘神心自悅跨水穿雲來相謁不問黄芽肘後方妙道通微怎生說時人若擬去瀛洲先過巍巍十二樓自有電雷聲振動一池金水向東流獨自高山望八都黑雲散後月還孤茫茫宇宙人無數幾箇男兒是丈夫火輪些小出神州用力般載使鐵牛赤心般上崑侖頂誰識還丹號紫遊精養靈根氣養神此眞眞外更無眞仙人不肯分明說迷却千千萬萬人五言律詩二十四神清三千功行成寒雲連地軸聖日滿天明王子偏冝種金田豈在耕此中眞妙理誰道不長生通道復通玄名留四海傳交親一拄杖活計兩空拳要果逡巡種思杯旋聖錢豈知來混世不又却迥天妙妙妙中妙玄中玄更玄動言俱演道語默盡成仙在掌如珠異當空月皎然他時功滿後直上大羅天純陽眞人渾成集卷下
