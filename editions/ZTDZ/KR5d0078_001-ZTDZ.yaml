front:
  text: 純陽眞人渾成集卷上
  hash: sha256:f56e3a61400a69af3e3ff64730c33a441e3aecad2ae0bdc3f1563adbf565317a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0078_SJB_001-230685c, image: sjb/23/230685c.png}
body:
  text: 勸世吟七言律詩二十九首爲人不可戀囂塵幻化身中有法身莫衒胷中摛錦繡好於境上惜精神迴來便訪仙家侣迷即難逃俗眷親爲告聰明英烈士休教昧了本來眞騎鯨幾出洞庭湖誰識逍遥厭世夫萬朵金蓮開混沌一輪心月印虛無不求我住黄金闕唯願人居白玉壺袖得青蛇歸去也鳯簫聲裏步天都暉暉星斗焕文章身逐閑雲别帝鄉一粒丹於方外煉百篇詩向醉中狂壺天自有長春境海島寧無不夜堂踏破碧霄雲外路九重天上傲羲皇喬木陰陰襯落霞好山都屬道人家寒灰温鼎重生焰枯樹歸根復放花人世興亡終有限瑶宫歲月了無涯天風觸亂鏗鏘珮來徃飛騰紫鳳車世情不悟只嚚頑空手歸來下寶山緑鬢逡巡翻雪鬢朱顔咫尺换蒼顔寸心勉作千年調四假何曾一日閑標柱題橋多少志也應囚入死生關雲山道士任閑閑門外黄塵總不干心印一輪千里月髻簮五嶽七星冠經開祕覽焚香誦琴少知音對影彈鶴遶藥爐朱頂動只疑飛出紫金丹虛空浩浩太無窮獨許神光上下通一點詩魂新氣槩五千言教舊家風迷時且究人間世覺處宜修物外功整翮摶風好歸去莫教容易困凡籠巍巍蕩蕩下天庭憔悴風光頗愴情細柳營深蚊陣宻長江波闊蜃樓横酒旗番作征旗動簫鼓更爲戰鼓聲無限競名貪利客幾人能得見清平紅門不可久蹉跎利未多時害已多莫縱頴鋒爲劔戟好平心地息風波蜂癡剛採花成蜜蠶死誰將繭織羅不義之財貪得富浮雲終久待如何識破窮通造物般空心一片任閑閑圓光上下千峰月靈相從横七寶山收拾乾坤歸手掌運般日月撼天關蒼生冗冗無由見一顆玄珠灼世間夢斷黄糧萬事休煙波不見蜃雲樓烹成鉛汞三千日躍出陰陽八百秋劎掛斗南魁北下氣横天外月稍頭來時携片無瑕鑑高貼青霄未肯收錯綜陰陽造化權人心徃徃不安然忽更星漢爲雲漢時變雪天爲雨天偷暖冰凘浮翠翼弄寒梅萼鬥芳妍可憐一段長春景誰送將來世上傳雲路迢迢信鶴行引吟佳句逼人清梅魂都被風偷去竹影全因月印成山好只知仁者樂酒醇優合老兒情共誰同醉逃兵綱閬苑逍遥樂太平曾記乘風下翠華香雲宻宻掩龍車因期閬苑神仙會醉卧山中處士家蝶夢莊周眞可味鹿疑鄭相愈堪嗟誰能解此玄中趣同泛銀河月夜搓勿乏靈源種子孫好留復命與歸根退身莫引東山妓抱朴休開北海樽紫鳳未乘歸絳闕烏衣先脫出紅門願君不竊饑民禄隨我同酬玉帝恩前生福業自今看再世因縁見在觀三世抱聦方作吏五生不昧始爲官休將荆棘栽心地莫縱干戈下頴端提得慧刀歸去好免教來徃戰饑寒半醒半醉出神京黯淡江山未放晴法雨暫隨霖雨沛慈雲閑逐暮雲生人間已壓塵埃息物外冥滋道力榮道力滋榮塵已息靈臺境内賀清平聖德凡情不可齊輕槔徒向海心揮一竿絲上垂香餌七里灘頭坐釣磯明月滿天紅蓼岸清風兩袖緑蓑衣水寒夜靜魚不得笑指長江告式微兔烏東出又西還轉首流年百與千莫逐陰魔消玉汞好將丹鼎煉金鉛塵中但恐抽頭晩物外端宜下手先這叚虛空還打破便應拂袖入雲巔澄澄一派舊靈源不屬纖塵點汙間朗朗朗同明月朗閑閑閑似白雲閑擘開天地牢籠網躍出陰陽造化關俗境有人聊得悟迴光對面是家山眞性元來得自由莫教人事强拘囚是非浪裏宜緘口名利場中好縮頭妻子冤親還了了死生途路得休休逍遥碧嶂青松下坐看殘花逐水流一丸丹樂久烹成高射崑崙灼灼明伫鼎自令龍虎伏開爐須遣鬼神驚大包天地應還窄細入塵沙不太盈頑石點來金可就人收爭得不長生鑄就龍泉不記秋護持法性得全周神光出匣輝烏兔冷焰淩霄射斗牛秉處十方三界淨揮時百怪萬魔愁來時特奉天都令封與人間烈士收黄鶴樓前吕氏家一壺天地老煙霞無形白鹿調朱鳳有箇烏龜纏赤蛇六月山頭飛白雪三冬水底長黄芽這些道理人還識陸地神仙鬧似麻目對千差物萬般當胷一點鎮閑閑但知得處如禪月不可空迴下寶山布袖拂開煩惱障芒鞋踏破死生關當時一著安排定不落陰陽戲弄間煙霞縹緲隱仙宫浩氣騰騰滿太空笻荷一輪河漢月鵬摶萬里海山風靈光返照先天外圓相含弘大道中更有白元君咫尺世人冗冗不能窮進後休貪非理物退時好認本來眞行慈但積無邊福寡欲休傷有限身緑鬢惟能添白髮紅塵難再遇青春君還悟徹兹狂語作箇逍遥物外人羅浮道士誰同流草衣木食輕王侯世間甲子管不得壺裏乾坤只自由數著殘棊江月曉一聲長嘯海山秋飮餘回首話歸路遥指白雲天際頭天網穹窿萬象踈一枝松倒華山枯寒雲散後留殘月臘雪來時向太虛十洞龍蛇歸紫府千年鸞鳳落蒼梧自從别却先生後南北東西少丈夫五言律詩夜靜寒江上綸收水聚波可嗟香餌少徒看錦鱗多欲作迴船計其爲逐境何徘徊明月底空負老漁蓑欲造修眞趣須憑造化權青龍吞紫霧白虎噴青煙皓氣騰三界陽光射九泉一丸丹藥就還與未生前七言絶句莫貴榮華戀宰臣林泉到處可潜身君知昔日逃秦者今作桃源洞裏人紅門竊利苦張羅來作浮漚去作波直至玉堂爲宰輔到令誰是漢蕭何伐盡靈根損盡眞髑髏裏面望精神相逢都道求仙去蓬島可曾見一人收得眞精養就丹寸心無礙自清閑功成行滿思歸日紫鳳銜書到世間羣陰消盡地雷鳴星斗闌干萬里横唤起純陽歸正位午前恰聽打三更一世人身萬劫修何須苦苦爲家愁到頭付與兒孫計著甚來由作馬牛龍倦雄吟虎倦哮將軍猶未脫征袍怒風捲地番天至摇落乾坤殺氣高打破虛空見便拿拿來最好作生涯不尋面壁蒙頭趣笑殺西來舊作家休誇年少騁風流强走輪迴販骨頭不信試臨明鏡看面皮底下是骷髏好財心返思眞道看色眸迴望武陵攀桂腕頭捐玉紐踏雲脚上解恩繩困民久已䧟刀兵不在顰眉發嘆聲咫尺前程安穩地只愁人意不清平木雕泥塑靜中身心境休沾一點塵默默冥冥無間斷這些風味契全眞莫問諠諠有市鄽市鄽對面是雲山但能方寸無纖翳别得壺天一味閑吏越蕭何值土埋文過子建亦哀哉尋思這箇荒荒世大底不如歸去來我愛賢哉白首翁仁人文質又彬彬何縁邀得乘風去堪與雲山作主人子孫衣禄子孫求枉了貪心强出頭直待愁來年月盡恁時平地變荒丘清貧處下非爲辱顯赫居高未是强試看太平無事日知他誰在與誰亡戒酒切戒酒兮切戒酒一點元光長保守爽然飛上玉京峯天地釀熟瓊漿有戒色切戒色兮切戒色色心纔起元神滅自然夫婦玉堂中一點精神千丈雪戒財切戒財兮切戒財休教苦把世人埋自家七寶瓊林裏有箇眞人壘玉臺戒氣切戒氣兮切戒氣只可綿綿不可廢有朝沖溢化元神飛上青霄朝玉帝戒愁切戒愁兮切戒愁剛貪名利幾時休榮華富貴都能幾限到頭來怎肯留心劔我有龍泉匣裏藏令人肝膽瑩神光一從提上中宫帳萬里羣魔不敢當心印寒光不動自天然應變隨人方與圓印定了知無那箇這生恰是未生前心鏡高掛靈臺久不磨自然影現萬森羅任從塵翳休吹拂吹拂塵無照甚麽心燈一點心燈熖熖生不勞挑撥朗然明得來照破人間暗獨放寒光滿太清心月一輪心月貼天庭兔𩲸蟾魂特地清些小閑雲難作障通天徹地自圓成心地心地無勞苦耨耕靜中獨有道芽生我從塡得無溝壑穩穩安閑一片平最玄吟六年雪嶺爲何因志定調和氣與神一百刻中都一息方知大道顯三乘玉皇差我化凡愚滿地蒼生與道踈四季暗偷身上寶五行明盜臉邊珠貪名貪利年年有去是去非日日無迴首却歸三島路免教上帝降天符九轉烹煎一味砂自然火候放童花星辰煉出青蓮顆日月臨藏白馬芽七返返成生碧霧九還還就吐紅霞有人奪得玄珠餌三島途中路不賒西方玉女産金苗本是乾坤火自燒水虎亂雲山下卧火龍散彩海中調陽魂王盛天非逺陰𩲸纔交地匪遥功滿自然生五彩騎鸞自在出雲霄天生一味變三才交感陰陽結聖胎龍虎順行陰鬼走龜蛇逆走火龍來嬰兒同與黄金髓姹女時斟白玉杯功滿自然歸物外人間寒暑任輪迴星辰聚會入離鄉日月虧盈助藥王三候火燒金鼎寶五符水煉玉壺漿乾坤返覆龍行雨卯酉相吞虎放光入室用機擒捉取一丸丹髓藥純陽八卦通靈會坎離震兌交時合二儀下手採時當王取煉烹成熟莫令遲八十一載在胞中爲煉純陽九九功白日乘雲歸上界至今遊憩紫微宫壺中四象自然神只道從民萬古君雖用甲兵安宇宙兩輪日月徃來頻豈勞師衆靜乾坤南方北户竟相通此用無非龍與虎八道神光徹底紅一一須從一一生眞金交會合相爭陽魂終處陰須散化出乾坤日月精五行須是配夫妻坎男離女少人知二體若交相感合却令丙老是親耆换骨年年别有方須烹龍虎在中央功成只是三千日血化如瓊髓似霜五行精髓一中包特地輪排候火燒直待水迴神室後定從平地到青霄北家離象坎家華更便東鄰震内芽每待丙公相接引必於爐裏厮擒枷四象循還戊巳尊志修恬澹蓋因君金木併時交水火一道紅霞接洞垠愛惜壺中一粒藏鎭丹幽洞在崑山此中不是凡間藥服了將身列聖班煉藥功程須九轉虎龍數足火相推一時進道朝中立猛烈須憑巽户吹搗和無路合時難志在專心子細觀姹女定知烏影裏嬰兒只在月輪端玄中一路更須玄苦苦言來不在言忽若遇時難取捨無門爭得見根源養得兒形似我形我身枯悴子光精生生世世常如此爭似留神養自身五言長篇百字詩本性好清靜保養心源定財又我不貪氣又我不競酒又何曾飲色慾已罷盡見者如不見聽者如不聽莫論他人過只尋自巳病官中不係名私下憑信行遇有不輕狂如無守本分不在他人殻免却心頭悶和光且同塵但把俗情混因甚不爭名曾共高人論五言律詩自詠山仙無人識佩劔入大唐回首南北看無意却歸鄉昨者尼磨殿早覺掛衣黃風行一陣黑百鬼盡潜藏五言絕句琴七絃飛雅操十指瀉松風唤覺浮生夢亭亭月印空棊黑白心難定何曾對面閑劫中多路險生死謾雙關書惆悵亡周後時儒謾檢尋各生仁與智孰到仲尼心畫可愛丹青手無窮三昧功江山多少景都在寸心中四言絕句清一念不起萬縁何生虛無浩浩月白風清靜外境不侵内神自定一點靈光瑩然自靜道無爲理深尋之越奥信手拈來是名曰道德德亦無形物無不育物旣含榮是爲眞德行法界雖弘歷之可越足步清風手携皓月住動則難言靜亦無說動靜兩忘中間且歇坐心滅寒灰身忘土塊默默冥冥光輝三界卧清靜家風希夷妙訣放開四大萬縁齊滅六言詩春暖羣花半開逍遥石上徘徊獨携玉律金訣閑踏青莎碧苔古洞眠十九載流霞飲幾千杯逢人莫話人事笑指白雲去來落𩲸歌落𩲸且落𩲸夜宿鄉村朝遊城郭閑來無事翫青山悶即街市貨丹藥賣得錢不筭度沽美酒自斟酌醉后吟哦動鬼神任意日頭向西落純陽眞人渾成集卷上
